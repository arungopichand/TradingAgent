services:
  - type: web
    name: trading-agent-api-arungopichand
    runtime: docker
    branch: main
    rootDir: KrishAgent
    dockerfilePath: ./KrishAgent/Dockerfile
    dockerContext: ./KrishAgent
    plan: free
    autoDeployTrigger: commit
    healthCheckPath: /api/test
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        sync: false
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: Alpaca__ApiKey
        sync: false
      - key: Alpaca__SecretKey
        sync: false
      - key: Alpaca__Feed
        value: iex
      - key: OpenAI__ApiKey
        sync: false
      - key: OpenAI__Model
        value: gpt-5-mini
